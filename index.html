<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Omok & Baduk - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>오목 & 바둑 (Omok & Baduk)</h1>
            <div id="game-status">
                <span id="turn-indicator" class="black-turn">흑(Black)의 차례입니다</span>
            </div>
            <div id="capture-status" class="hidden">
                <span id="black-captures">따낸 흑돌: 0</span> | 
                <span id="white-captures">따낸 백돌: 0</span>
            </div>
        </header>

        <div id="game-layout">
            <main id="board-area">
                <div id="board-container">
                    <div id="game-board">
                        <!-- Grid points will be generated by JavaScript -->
                    </div>
                </div>
            </main>

            <aside id="sidebar">
                <section id="game-mode-selector">
                    <h3>게임 설정</h3>
                    <div class="control-group">
                        <label>모드: </label>
                        <select id="mode-select">
                            <option value="omok">오목 (Omok)</option>
                            <option value="baduk">바둑 (Baduk)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>크기: </label>
                        <select id="size-select">
                            <option value="15">15x15</option>
                            <option value="19" selected>19x19</option>
                        </select>
                    </div>
                </section>

                <section id="move-history">
                    <h3>기보 (Move History)</h3>
                    <div id="history-list">
                        <!-- Moves will be listed here -->
                    </div>
                </section>
                
                <section id="view-controls">
                    <button id="toggle-numbers-btn" class="glow-on-hover small">수순 표시 (Show Numbers)</button>
                    <button id="restart-btn" class="glow-on-hover">새 게임 (New Game)</button>
                </section>

                <section id="partnership">
                    <button id="open-form-btn" class="link-btn">제휴 문의하기</button>
                </section>
            </aside>
        </div>

        <footer>
            <p id="game-desc">다섯 개의 바둑알을 먼저 나란히 놓으면 승리합니다.</p>
        </footer>
    </div>

    <!-- Partnership Modal -->
    <div id="form-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/maqpjzpe" method="POST">
                <div class="form-group">
                    <label for="name">이름/기업명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 관련 내용을 적어주세요."></textarea>
                </div>
                <button type="submit" class="glow-on-hover">문의 보내기</button>
            </form>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
